-G                  # Enable GameMode (Sets CPU governor to performance)
 #--rt                # Use real-time scheduling for smoother frame pacing

# --- Integration & Windowing ---
 #-f                  # Start in fullscreen
-e                  # Enable Steam integration (ESync/FSync support)
 #--backend wayland   # Force Wayland backend (better for Hyprland)

# --- Display & Sync (RTX 3090 Ti specific) ---
--adaptive-sync     # Enables G-Sync/VRR (Crucial for a 3090 Ti)
 #--hdr-enabled       # Enable HDR if your monitor supports it

 #-r 165

# --- Mouse & Interaction ---
 #--force-grab-cursor # Prevents mouse from leaving the game window
 #--hide-cursor-delay 3000

# --- Upscaling (If you want to play at lower res but look like 4K) ---
# -U                # Use FSR upscaling
# --fsr-upscale 2   # FSR Sharpness (0-20, 2 is usually sweet spot)
